inputs:
  mqtt_in:
    type: mqtt                        # TODO(CODEX): not yet implemented
    broker: "mqtt://localhost:1883"
    topic: "sensors/#"
    client_id: argus-mqtt-client

outputs:
  kafka_out:
    type: kafka
    brokers: "${KAFKA_BROKERS:localhost:9092}"
    topic: mqtt.events

pipelines:
  mqtt_forward:
    from: mqtt_in
    # transforms:
    #   - type: add_fields
