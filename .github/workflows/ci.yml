# ---------------------------------------------------------------------------
# Argus CI — GitHub Actions
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

name: CI

# Minimal permissions for read-only CI
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Rust: fmt + clippy + test
  # --------------------------------------------------------------------------
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/connector_host

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/connector_host/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/connector_host/Cargo.toml', 'crates/connector_host/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

  # --------------------------------------------------------------------------
  # Elixir: format + test
  # --------------------------------------------------------------------------
  elixir:
    name: Elixir (format / test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/router_core

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"

      - name: Cache Mix deps
        uses: actions/cache@v4
        with:
          path: |
            apps/router_core/deps
            apps/router_core/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/router_core/mix.exs', 'apps/router_core/mix.lock') }}

      - name: Install deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

