version: "3.9"

# ---------------------------------------------------------------------------
# Argus Event Router — docker-compose
#
# Bring-up order:
#   1. redpanda   — Kafka-compatible broker (single container, no ZooKeeper)
#   2. redpanda-init — creates topics once broker is healthy
#   3. router     — Elixir+Rust event-router application
#
# Optional services (commented out — TODO(CODEX): enable when connectors are ready):
#   - mqtt        — Eclipse Mosquitto MQTT broker
#   - rabbitmq    — RabbitMQ broker
# ---------------------------------------------------------------------------

services:
  # -------------------------------------------------------------------------
  # Redpanda — Kafka-compatible message broker (simplest single-node setup)
  # -------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v23.3.13
    container_name: argus-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "9092:9092"
      - "8082:8082"
      - "8081:8081"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info", "--brokers=localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 12

  # -------------------------------------------------------------------------
  # Topic bootstrap — creates required topics on first start
  # -------------------------------------------------------------------------
  redpanda-init:
    image: redpandadata/redpanda:v23.3.13
    container_name: argus-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        rpk topic create input.events  --brokers redpanda:9092 --partitions 1 --replicas 1 || true
        rpk topic create output.events --brokers redpanda:9092 --partitions 1 --replicas 1 || true
        echo "Topics ready."
    restart: on-failure

  # -------------------------------------------------------------------------
  # Router — Elixir application that spawns the Rust connector-host binary
  # -------------------------------------------------------------------------
  router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: argus-router
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    environment:
      ROUTER_CONFIG: /app/configs/examples/kafka_to_log.yaml
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "4000:4000"
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # TODO(CODEX): Uncomment when MQTT connector is implemented
